<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Layout with CSS</title>

    <style>
        body{
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        header{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        section{
            background-color: white;
            margin: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        article{
            background-color: #e8e8e8;
            margin: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        footer{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my webpage</p>
</header>

<section>
    <h2>About Us</h2>
    <p>This section contains information about our website.</p>
</section>

<article>
    <h2>Latest Article</h2>
    <p>This article shows the latest update.</p>
</article>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
